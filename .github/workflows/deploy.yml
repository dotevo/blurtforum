name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # trigger on every push to main
  workflow_dispatch:  # allow manual trigger from Actions tab

# Grant GITHUB_TOKEN the permissions required to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress runs on new pushes
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Build
        # VITE_BASE tells Vite the sub-path where the app is served on GitHub Pages.
        # GitHub Pages serves user/org sites at / but project sites at /<repo-name>/.
        # Set the REPO_NAME secret (or variable) in your repo settings, e.g. "blurtforum".
        # If you use a custom domain or a user/org site, set VITE_BASE to "/".
        env:
          VITE_BASE: ${{ vars.VITE_BASE || format('/{0}/', github.event.repository.name) }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
